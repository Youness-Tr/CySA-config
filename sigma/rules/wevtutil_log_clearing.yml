title: Windows Log Clearing via Wevtutil
id: a8b9c0d1-e2f3-4a5b-6c7d-8e9f0a1b2c3d
status: experimental
description: Detects the clearing of Windows event logs using the wevtutil utility.
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    Image|endswith: '\wevtutil.exe'
    CommandLine|contains:
      - ' cl '
      - 'clear-log'
  condition: selection
falsepositives:
  - Automated maintenance scripts
level: high
tags:
  - attack.defense_evasion
  - attack.t1070.001
