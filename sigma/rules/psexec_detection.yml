title: PsExec Execution Detection
id: f1a2e3b4-5c6d-7e8f-9a0b-1c2d3e4f5a6b
status: experimental
description: Detects the execution of PsExec by checking for the default service installation or process name.
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    Image|endswith:
      - '\psexec.exe'
      - '\psexesvc.exe'
  condition: selection
falsepositives:
  - Administrative activity
level: high
tags:
  - attack.lateral_movement
  - attack.t1570
