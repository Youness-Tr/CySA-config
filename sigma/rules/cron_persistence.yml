title: Linux Cron Persistence Modification
id: b9c0d1e2-f3a4-5b6c-7d8e-9f0a1b2c3d4e
status: experimental
description: Detects modifications to cron directories or crontab file edits indicative of persistence.
logsource:
  product: linux
  category: process_creation
detection:
  selection:
    Image|endswith: '/crontab'
    CommandLine|contains:
      - ' -e'
      - ' /etc/cron.'
  condition: selection
falsepositives:
  - System updates
  - Legitimate administrator task scheduling
level: medium
tags:
  - attack.persistence
  - attack.t1053.003
