version: '3.8'

services:
  wazuh.indexer:
    image: wazuh/wazuh-indexer:4.14.5
    container_name: single-node-wazuh.indexer-1
    environment:
      - OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - /opt/cysa/wazuh-docker/single-node/config/wazuh_indexer/internal_users.yml:/usr/share/wazuh-indexer/config/opensearch-security/internal_users.yml:rw
      - /opt/cysa/wazuh-docker/single-node/config/wazuh_indexer/wazuh.indexer.yml:/usr/share/wazuh-indexer/config/opensearch.yml:rw
      - /opt/cysa/wazuh-docker/single-node/config/wazuh_indexer_ssl_certs/root-ca.pem:/usr/share/wazuh-indexer/config/certs/root-ca.pem:rw
      - /opt/cysa/wazuh-docker/single-node/config/wazuh_indexer_ssl_certs/wazuh.indexer-key.pem:/usr/share/wazuh-indexer/config/certs/wazuh.indexer.key:rw
      - /opt/cysa/wazuh-docker/single-node/config/wazuh_indexer_ssl_certs/wazuh.indexer.pem:/usr/share/wazuh-indexer/config/certs/wazuh.indexer.pem:rw
      - /opt/cysa/wazuh-docker/single-node/config/wazuh_indexer_ssl_certs/admin.pem:/usr/share/wazuh-indexer/config/certs/admin.pem:rw
      - /opt/cysa/wazuh-docker/single-node/config/wazuh_indexer_ssl_certs/admin-key.pem:/usr/share/wazuh-indexer/config/certs/admin-key.pem:rw
      - wazuh-indexer-data:/var/lib/wazuh-indexer:rw
    ports:
      - "9200:9200"
    restart: unless-stopped
    networks:
      - default

  wazuh.manager:
    image: wazuh/wazuh-manager:4.14.5
    container_name: single-node-wazuh.manager-1
    environment:
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=MyS3cr37P450r.*-
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword
      - INDEXER_URL=https://wazuh.indexer:9200
      - FILEBEAT_SSL_VERIFICATION_MODE=full
      - SSL_CERTIFICATE_AUTHORITIES=/etc/ssl/root-ca.pem
      - SSL_CERTIFICATE=/etc/ssl/filebeat.pem
      - SSL_KEY=/etc/ssl/filebeat.key
    volumes:
      - wazuh_etc:/var/ossec/etc:rw
      - wazuh_queue:/var/ossec/queue:rw
      - wazuh_var_multigroups:/var/ossec/var/multigroups:rw
      - wazuh_integrations:/var/ossec/integrations:rw
      - wazuh_active_response:/var/ossec/active-response/bin:rw
      - wazuh_api_configuration:/var/ossec/api/configuration:rw
      - wazuh_logs:/var/ossec/logs:rw
      - wazuh_agentless:/var/ossec/agentless:rw
      - wazuh_wodles:/var/ossec/wodles:rw
      - filebeat_etc:/etc/filebeat:rw
      - filebeat_var:/var/lib/filebeat:rw
      - /var/log/suricata:/var/log/suricata:ro
      - /opt/cysa/wazuh-docker/single-node/config/wazuh_cluster/wazuh_manager.conf:/wazuh-config-mount/etc/ossec.conf:rw
      - /opt/cysa/wazuh-docker/single-node/config/wazuh_indexer_ssl_certs/root-ca-manager.pem:/etc/ssl/root-ca.pem:rw
      - /opt/cysa/wazuh-docker/single-node/config/wazuh_indexer_ssl_certs/wazuh.manager.pem:/etc/ssl/filebeat.pem:rw
      - /opt/cysa/wazuh-docker/single-node/config/wazuh_indexer_ssl_certs/wazuh.manager-key.pem:/etc/ssl/filebeat.key:rw
    ports:
      - "1514:1514"
      - "1515:1515"
      - "514:514/udp"
      - "55000:55000"
    restart: unless-stopped
    depends_on:
      - wazuh.indexer
    networks:
      - default

volumes:
  wazuh-indexer-data:
    name: single-node_wazuh-indexer-data
  wazuh_etc:
    name: single-node_wazuh_etc
  wazuh_queue:
    name: single-node_wazuh_queue
  wazuh_var_multigroups:
    name: single-node_wazuh_var_multigroups
  wazuh_integrations:
    name: single-node_wazuh_integrations
  wazuh_active_response:
    name: single-node_wazuh_active_response
  wazuh_api_configuration:
    name: single-node_wazuh_api_configuration
  wazuh_logs:
    name: single-node_wazuh_logs
  wazuh_agentless:
    name: single-node_wazuh_agentless
  wazuh_wodles:
    name: single-node_wazuh_wodles
  filebeat_etc:
    name: single-node_filebeat_etc
  filebeat_var:
    name: single-node_filebeat_var

networks:
  default:
    name: single-node_default
